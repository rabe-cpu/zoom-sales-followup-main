<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Routine導入の全体像</title>
  <desc id="desc">Zoom、Claude Routine、Google Drive、Chatwork、人間確認の流れ</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .box-strong { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .title { font: 700 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; fill: #0f172a; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; fill: #0f172a; }
      .small { font: 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; fill: #334155; }
      .note { font: 13px -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; fill: #64748b; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1120" height="420"/>
  <text x="40" y="46" class="title">Claude Routine 用: Zoomからメール下書きまで</text>
  <text x="40" y="72" class="note">Webhookは使わない。Routineが定期的にZoom APIへ取りに行く。</text>

  <rect x="40" y="120" width="180" height="120" class="box"/>
  <text x="70" y="155" class="label">Zoom</text>
  <text x="70" y="184" class="small">Cloud Recording</text>
  <text x="70" y="208" class="small">Audio Transcript</text>

  <path d="M225 180 H320" class="arrow"/>

  <rect x="325" y="120" width="210" height="120" class="box-strong"/>
  <text x="355" y="155" class="label">Claude Routine</text>
  <text x="355" y="184" class="small">fetch_vtt.py</text>
  <text x="355" y="208" class="small">ROUTINE_PROMPT.md</text>

  <path d="M540 180 H635" class="arrow"/>

  <rect x="640" y="120" width="190" height="120" class="box"/>
  <text x="670" y="155" class="label">Google Drive</text>
  <text x="670" y="184" class="small">顧客送付用Docs</text>
  <text x="670" y="208" class="small">社内確認用Docs</text>

  <path d="M835 180 H930" class="arrow"/>

  <rect x="935" y="120" width="145" height="120" class="box"/>
  <text x="965" y="155" class="label">Chatwork</text>
  <text x="965" y="184" class="small">完了通知</text>
  <text x="965" y="208" class="small">Docs URL</text>

  <path d="M735 245 V312 H430 V258" class="arrow"/>
  <rect x="330" y="300" width="210" height="80" class="box"/>
  <text x="360" y="334" class="label">処理済み台帳</text>
  <text x="360" y="360" class="small">processed_meetings.json</text>

  <rect x="640" y="300" width="260" height="80" class="box"/>
  <text x="670" y="334" class="label">人間が確認して送信</text>
  <text x="670" y="360" class="small">黄色箇所 / ZOOM URL / 固有情報</text>
</svg>
